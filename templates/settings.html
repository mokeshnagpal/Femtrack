{% extends "base.html" %}

{% block title %}Settings - Femtrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-8 col-lg-10 col-md-12">
        <!-- Change Password --> 
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-key"></i> Change Password</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">
                    <i class="fas fa-info-circle"></i> Update your personal login password.
                </p>
                <form method="POST">
                    <input type="hidden" name="change_password" value="1">
                    <div class="mb-3">
                        <label for="old_password" class="form-label"><i class="fas fa-lock"></i> Current Password</label>
                        <input type="password" class="form-control" id="old_password" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label"><i class="fas fa-lock-open"></i> New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label"><i class="fas fa-check-circle"></i> Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Change Password</button>
                        <a href="/" class="btn btn-secondary">Back to Home</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
