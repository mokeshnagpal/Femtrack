<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#grad4)"/>
  
  <!-- Smartphone with data on left -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="140" height="250" rx="12" fill="white" opacity="0.95" stroke="white" stroke-width="2"/>
    <rect x="8" y="8" width="124" height="234" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
    <line x1="8" y1="45" x2="132" y2="45" stroke="#ddd" stroke-width="1"/>
    <circle cx="15" cy="25" r="3" fill="#667eea"/>
    <circle cx="20" cy="25" r="3" fill="#667eea"/>
    <circle cx="25" cy="25" r="3" fill="#667eea"/>
    <line x1="15" y1="60" x2="125" y2="60" stroke="#667eea" stroke-width="1"/>
    <line x1="15" y1="75" x2="125" y2="75" stroke="#667eea" stroke-width="1"/>
    <line x1="15" y1="90" x2="125" y2="90" stroke="#667eea" stroke-width="1"/>
  </g>
  
  <!-- Checklist and notes in center/right -->
  <g transform="translate(600, 200)">
    <g transform="translate(-150, 0)">
      <rect x="0" y="0" width="140" height="30" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
      <line x1="10" y1="15" x2="25" y2="15" stroke="white" stroke-width="2"/>
      <text x="40" y="20" font-size="12" fill="white" font-weight="bold">Record symptoms</text>
      
      <rect x="0" y="45" width="140" height="30" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
      <line x1="10" y1="60" x2="25" y2="60" stroke="white" stroke-width="2"/>
      <text x="40" y="65" font-size="12" fill="white" font-weight="bold">Track intensity</text>
      
      <rect x="0" y="90" width="140" height="30" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
      <line x1="10" y1="105" x2="25" y2="105" stroke="white" stroke-width="2"/>
      <text x="40" y="110" font-size="12" fill="white" font-weight="bold">View insights</text>
    </g>
  </g>
  
  <text x="600" y="100" font-size="64" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">
    Simple. Smart. Powerful.
  </text>
  <text x="600" y="180" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="Arial">
    Track daily, understand weekly
  </text>
</svg>